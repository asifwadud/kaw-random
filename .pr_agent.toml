# GitHub App
[github_app]
pr_commands = [
    "/agentic_describe",
    "/agentic_review"
]

[review_agent]
comments_location_policy = "both"

# severity threshold rank for inline comments:
# 3=action_required,
# 2=remediation_recommended,
# 1=informational.
# Only findings with rank >= threshold will be published inline
inline_comments_severity_threshold = 3

# Extra prompt for usecase to be added as instruction for the agent
issues_user_guidelines = """
This is a modern C++20 header-only random number utility library under the `kaw::random` namespace.
Please check the code for the following logic and quality rules:
1. Thread Safety: Ensure random number generator engines (std::mt19937) are thread_local to prevent race conditions and multi-threaded lock contention.
2. C++20 Concepts: Verify template functions use concepts (e.g., std::integral, std::floating_point) instead of legacy SFINAE or std::enable_if.
3. Interval Bounds: Integer distributions must use closed intervals [low, high]; floating-point distributions must use half-open intervals [low, high).
4. Header-only compilation: All functions in headers must be inline, templates, or class members to avoid duplicate symbol linker errors.
"""

compliance_user_guidelines = """
Ensure that:
1. Catch2 unit test cases in tests/RandomNumbersTest.cpp are added or updated to cover any logic changes.
2. Code style matches the existing codebase conventions.
"""
